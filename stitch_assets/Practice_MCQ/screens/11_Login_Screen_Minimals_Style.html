<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - The Editorial Scholar</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#00AB55",
              "primary-hover": "#00964b",
              "on-primary": "#ffffff",
              "background": "#F9FAFB",
              "surface": "#ffffff",
              "text-primary": "#212B36",
              "text-secondary": "#637381",
              "text-disabled": "#919EAB",
              "border": "#919EAB",
              "input-bg": "#ffffff",
              "error": "#FF5630",
            },
            fontFamily: {
              "sans": ["'Public Sans'", "sans-serif"],
              "headline": ["'Public Sans'", "sans-serif"],
              "body": ["'Public Sans'", "sans-serif"],
              "label": ["'Public Sans'", "sans-serif"]
            },
            borderRadius: {
              "DEFAULT": "0.5rem",
              "lg": "0.75rem",
              "xl": "1rem",
              "2xl": "1.5rem",
              "full": "9999px"
            },
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Public Sans', sans-serif;
            background-color: #F9FAFB;
        }
        .login-card {
            box-shadow: 0 0 2px 0 rgba(145, 158, 171, 0.2), 0 12px 24px -4px rgba(145, 158, 171, 0.12);
        }
        .bg-pattern {
            background-image: radial-gradient(#919EAB 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            opacity: 0.1;
        }
    </style>
</head>
<body class="text-text-primary antialiased bg-background relative overflow-hidden">
<!-- Subtle Background Pattern -->
<div class="absolute inset-0 bg-pattern pointer-events-none"></div>
<div class="min-h-screen relative z-10 flex flex-col items-center justify-center p-4 sm:p-6 lg:p-8">
<div class="w-full max-w-md space-y-8 bg-surface p-8 sm:p-10 rounded-[2rem] login-card">
<div class="space-y-6">
<div class="flex flex-col items-start gap-2">
<div class="w-12 h-12 rounded-xl bg-primary/10 flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="menu_book">menu_book</span>
</div>
<h1 class="text-2xl font-bold text-text-primary tracking-tight">Welcome Back</h1>
<p class="text-text-secondary font-medium">Continue your preparation</p>
</div>
<form class="space-y-6">
<div class="space-y-5">
<div class="group">
<label class="block text-sm font-bold text-text-primary mb-2" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-text-disabled text-xl" data-icon="mail">mail</span>
<input autocomplete="email" class="block w-full pl-12 pr-4 py-3.5 rounded-xl border border-border/30 bg-input-bg text-text-primary placeholder:text-text-disabled focus:ring-0 focus:border-primary transition-all duration-200" id="email" name="email" placeholder="Enter your email" required="" type="email"/>
</div>
</div>
<div class="group">
<label class="block text-sm font-bold text-text-primary mb-2" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-text-disabled text-xl" data-icon="lock">lock</span>
<input autocomplete="current-password" class="block w-full pl-12 pr-12 py-3.5 rounded-xl border border-border/30 bg-input-bg text-text-primary placeholder:text-text-disabled focus:ring-0 focus:border-primary transition-all duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-text-disabled hover:text-text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
</div>
<div class="flex items-center justify-end">
<a class="text-sm font-semibold text-primary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<div class="space-y-5 pt-2">
<button class="w-full flex justify-center items-center py-3.5 px-6 rounded-xl text-md font-bold text-on-primary bg-primary hover:bg-primary-hover active:scale-[0.98] transition-all duration-200 shadow-md shadow-primary/20" type="submit">
                            Sign In
                        </button>
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-border/20"></div>
<span class="flex-shrink mx-4 text-xs font-bold text-text-disabled uppercase tracking-widest">OR</span>
<div class="flex-grow border-t border-border/20"></div>
</div>
<button class="w-full flex items-center justify-center gap-3 py-3.5 px-6 rounded-xl bg-surface border border-border/20 hover:bg-background transition-colors duration-200 active:scale-[0.98]" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-bold text-text-primary">Continue with Google</span>
</button>
</div>
</form>
</div>
<div class="pt-6 text-center border-t border-border/10">
<p class="text-text-secondary text-sm font-medium">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline transition-all" href="#">Sign Up</a>
</p>
</div>
</div>
<div class="mt-8 flex items-center gap-8 opacity-60">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-lg text-text-secondary" data-icon="verified_user">verified_user</span>
<span class="text-xs font-bold text-text-secondary uppercase tracking-wider">Secure Login</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-lg text-text-secondary" data-icon="cloud_done">cloud_done</span>
<span class="text-xs font-bold text-text-secondary uppercase tracking-wider">Progress Synced</span>
</div>
</div>
</div>
</body></html>
