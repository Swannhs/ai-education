<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col">
<!-- Header Navigation (Transactional - No Global Nav Shell) -->
<header class="w-full top-0 sticky bg-surface/80 backdrop-blur-xl z-50">
<div class="flex items-center justify-between px-6 py-4 w-full">
<button class="text-on-surface-variant hover:bg-surface-container transition-colors p-2 rounded-full active:scale-95 transition-transform">
<span class="material-symbols-outlined block" data-icon="arrow_back">arrow_back</span>
</button>
<div class="text-[#00A76F] font-bold text-xl tracking-tighter">GovPrep BD</div>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-6 py-12 md:py-24">
<div class="max-w-md w-full">
<!-- Glassmorphic Content Card -->
<div class="bg-surface-container-lowest rounded-xl editorial-shadow p-8 md:p-12 border border-outline-variant/10 text-center">
<!-- Recovery Icon Visual -->
<div class="mb-8 inline-flex items-center justify-center w-20 h-20 rounded-full bg-primary-container/10">
<span class="material-symbols-outlined text-primary-container text-4xl" data-icon="lock_reset" style="font-variation-settings: 'FILL' 1;">lock_reset</span>
</div>
<!-- Typography Hook -->
<h1 class="font-headline font-bold text-3xl md:text-4xl text-on-surface tracking-tight mb-4">Forgot Password?</h1>
<p class="font-body text-on-surface-variant text-base leading-relaxed mb-10 px-4">
                    Enter your email to receive a recovery code
                </p>
<!-- Form Section -->
<form class="space-y-6">
<div class="text-left">
<label class="block font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-2 ml-1" for="email">Email Address</label>
<div class="relative">
<input class="w-full px-4 py-4 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary-container/30 focus:bg-surface-container-highest transition-all duration-200 placeholder:text-outline/50 text-on-surface font-body" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary-container text-on-primary font-headline font-bold py-4 rounded-xl shadow-lg shadow-primary-container/20 hover:brightness-110 active:scale-95 transition-all duration-200" type="submit">
                        Send Code
                    </button>
</form>
<!-- Secondary Link -->
<div class="mt-10">
<a class="inline-flex items-center gap-2 font-label text-sm font-semibold text-on-surface-variant hover:text-primary-container transition-colors group" href="#">
<span class="material-symbols-outlined text-lg group-hover:-translate-x-1 transition-transform" data-icon="chevron_left">chevron_left</span>
                        Return to Sign In
                    </a>
</div>
</div>
<!-- Contextual Branding Support -->
<div class="mt-12 text-center">
<p class="font-label text-[11px] text-outline/60 uppercase tracking-widest">
                    Secured by Bangladesh Civil Service Prep Portal
                </p>
</div>
</div>
</main>
