<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Curator | Master Your Preparation</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-low": "#ebf5ff",
              "tertiary-container": "#c78500",
              "surface": "#f6f9ff",
              "surface-tint": "#006c46",
              "outline-variant": "#bccabf",
              "surface-dim": "#cbdcec",
              "secondary": "#0459c5",
              "on-primary-container": "#00321f",
              "inverse-surface": "#22323e",
              "secondary-fixed": "#d9e2ff",
              "inverse-primary": "#5adda0",
              "on-tertiary-fixed": "#291800",
              "on-tertiary": "#ffffff",
              "on-primary": "#ffffff",
              "surface-container-high": "#d9eafa",
              "on-primary-fixed-variant": "#005234",
              "on-secondary-fixed": "#001a43",
              "tertiary": "#825500",
              "error": "#ba1a1a",
              "on-secondary-container": "#002963",
              "tertiary-fixed-dim": "#ffb950",
              "on-surface": "#0d1d29",
              "surface-container-highest": "#d4e5f5",
              "primary": "#006c46",
              "on-primary-fixed": "#002112",
              "surface-container": "#e0f0ff",
              "outline": "#6d7a71",
              "error-container": "#ffdad6",
              "surface-container-lowest": "#ffffff",
              "on-surface-variant": "#3d4a41",
              "surface-variant": "#d4e5f5",
              "on-tertiary-container": "#3e2700",
              "on-secondary": "#ffffff",
              "on-tertiary-fixed-variant": "#624000",
              "on-error": "#ffffff",
              "surface-bright": "#f6f9ff",
              "primary-container": "#00a76f",
              "primary-fixed-dim": "#5adda0",
              "primary-fixed": "#79fabb",
              "inverse-on-surface": "#e6f2ff",
              "on-secondary-fixed-variant": "#004398",
              "background": "#f6f9ff",
              "tertiary-fixed": "#ffddb3",
              "secondary-fixed-dim": "#afc6ff",
              "on-error-container": "#93000a",
              "on-background": "#0d1d29",
              "secondary-container": "#5790ff"
            },
            fontFamily: {
              "headline": ["Public Sans"],
              "body": ["Public Sans"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes subtle-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.85; transform: scale(0.98); }
        }
        .animate-pulse-slow {
            animation: subtle-pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .loading-bar-fill {
            animation: loading-progress 2.5s ease-in-out infinite;
        }
        @keyframes loading-progress {
            0% { width: 0%; left: 0%; }
            50% { width: 40%; left: 30%; }
            100% { width: 0%; left: 100%; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface overflow-hidden">
<!-- Splash Screen Container -->
<main class="relative h-screen w-full flex flex-col items-center justify-center px-6">
<!-- Background Editorial Texture (Subtle tonal shift) -->
<div class="absolute inset-0 z-0 opacity-40">
<div class="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-surface via-surface-container-low to-surface-container-highest"></div>
</div>
<!-- Brand Identity Core -->
<div class="relative z-10 flex flex-col items-center animate-pulse-slow">
<!-- Brand Logo Mark -->
<div class="mb-12 relative">
<div class="w-32 h-32 md:w-40 md:h-40 bg-surface-container-lowest rounded-full flex items-center justify-center shadow-[0_24px_48px_-12px_rgba(0,108,70,0.08)]">
<!-- Icon Layering -->
<div class="absolute inset-0 bg-primary/5 rounded-full blur-xl"></div>
<div class="relative flex items-center justify-center bg-gradient-to-tr from-primary to-primary-container p-6 md:p-8 rounded-xl shadow-lg">
<span class="material-symbols-outlined text-on-primary text-5xl md:text-6xl" data-icon="school" style="font-variation-settings: 'FILL' 1;">school</span>
</div>
<!-- Decorative Element -->
<div class="absolute -top-2 -right-2 w-8 h-8 md:w-10 md:h-10 bg-tertiary-container rounded-full flex items-center justify-center border-4 border-surface-container-lowest shadow-sm">
<span class="material-symbols-outlined text-white text-sm md:text-base" data-icon="verified" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
</div>
</div>
<!-- Typography Hook -->
<div class="text-center space-y-4">
<h1 class="font-headline text-4xl md:text-5xl font-extrabold tracking-tighter text-on-surface">
                    The <span class="text-primary">Curator</span>
</h1>
<p class="font-label text-sm md:text-base text-on-surface-variant tracking-[0.2em] uppercase font-medium max-w-xs mx-auto">
                    The Curated Path to Success
                </p>
</div>
</div>
<!-- Bottom Loading Indicator -->
<div class="absolute bottom-24 left-0 w-full flex flex-col items-center space-y-8">
<div class="w-48 h-[3px] bg-surface-container-highest rounded-full overflow-hidden relative">
<div class="loading-bar-fill absolute h-full bg-primary rounded-full"></div>
</div>
<div class="flex items-center gap-3 text-on-surface-variant/60 font-label text-[11px] tracking-widest uppercase">
<span class="material-symbols-outlined text-sm" data-icon="sync">sync</span>
                Preparing Workspace
            </div>
</div>
<!-- Editorial Footnote (Bangladesh Government Prep Context) -->
<footer class="absolute bottom-10 text-on-surface-variant/40 font-label text-[10px] tracking-tight text-center">
            Dedicated to the Civil Service of Bangladesh
        </footer>
</main>
<!-- Suppressed Shell Components for Splash Integrity -->
<!-- (TopAppBar and BottomNavBar are visually absent as per focus mandate) -->
<div class="sr-only">
<!-- These are kept hidden as per the "Task-Focused/Splash" Rule in the Shell Visibility & Relevance filter -->
<nav aria-label="Hidden Primary Navigation">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="material-symbols-outlined" data-icon="search">search</span>
<span class="material-symbols-outlined" data-icon="Bookmark">bookmark</span>
<span class="material-symbols-outlined" data-icon="person">person</span>
</nav>
</div>
</body></html>
