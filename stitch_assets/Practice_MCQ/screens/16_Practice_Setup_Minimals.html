<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Practice Setup - Job Prep</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-surface": "#0d1d29",
                        "on-error": "#ffffff",
                        "surface-variant": "#d4e5f5",
                        "surface-dim": "#cbdcec",
                        "on-primary-container": "#00321f",
                        "surface-bright": "#f6f9ff",
                        "secondary-fixed-dim": "#afc6ff",
                        "on-surface-variant": "#3d4a41",
                        "secondary-fixed": "#d9e2ff",
                        "surface-container-lowest": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-background": "#0d1d29",
                        "surface-tint": "#006c46",
                        "primary-fixed": "#79fabb",
                        "inverse-on-surface": "#e6f2ff",
                        "error": "#ba1a1a",
                        "secondary-container": "#5790ff",
                        "surface": "#f6f9ff",
                        "on-tertiary-fixed-variant": "#624000",
                        "on-secondary-fixed": "#001a43",
                        "secondary": "#0459c5",
                        "primary": "#006c46",
                        "outline-variant": "#bccabf",
                        "on-tertiary-container": "#3e2700",
                        "tertiary-fixed-dim": "#ffb950",
                        "outline": "#6d7a71",
                        "primary-container": "#00a76f",
                        "surface-container": "#e0f0ff",
                        "on-primary-fixed-variant": "#005234",
                        "on-tertiary-fixed": "#291800",
                        "tertiary-fixed": "#ffddb3",
                        "surface-container-highest": "#d4e5f5",
                        "surface-container-high": "#d9eafa",
                        "error-container": "#ffdad6",
                        "on-secondary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-primary": "#ffffff",
                        "on-secondary-container": "#002963",
                        "primary-fixed-dim": "#5adda0",
                        "tertiary-container": "#c78500",
                        "background": "#f6f9ff",
                        "inverse-primary": "#5adda0",
                        "surface-container-low": "#ebf5ff",
                        "on-primary-fixed": "#002112",
                        "tertiary": "#825500",
                        "inverse-surface": "#22323e",
                        "on-secondary-fixed-variant": "#004398"
                    },
                    fontFamily: {
                        "headline": ["Public Sans"],
                        "body": ["Public Sans"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f6f9ff;
            color: #0d1d29;
            font-family: 'Public Sans', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen pb-32">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 bg-[#f6f9ff] dark:bg-slate-950">
<div class="flex items-center px-4 h-16 w-full max-w-7xl mx-auto">
<button class="p-2 mr-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined text-slate-500 dark:text-slate-400" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Public_Sans'] font-semibold text-lg tracking-tight text-[#00A76F] dark:text-[#00A76F]">Practice Session</h1>
</div>
</header>
<main class="max-w-xl mx-auto px-6 pt-4 space-y-10">
<!-- AI Recommendation Card -->
<section class="relative overflow-hidden p-5 rounded-xl bg-primary-container/10 border border-primary-container/20 group">
<div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
<span class="material-symbols-outlined text-6xl" data-icon="auto_awesome">auto_awesome</span>
</div>
<div class="flex items-start gap-3">
<span class="material-symbols-outlined text-primary-container mt-1" data-icon="tips_and_updates">tips_and_updates</span>
<div class="space-y-1">
<p class="font-label text-[11px] font-semibold text-primary-container uppercase tracking-wider">Recommended for you</p>
<p class="text-on-surface font-medium leading-tight">15-question timed practice on weak topics (Math)</p>
</div>
</div>
</section>
<!-- Exam Selector -->
<section class="space-y-4">
<div class="flex items-center justify-between">
<h2 class="text-sm font-bold text-on-surface uppercase tracking-widest">Select Exam</h2>
</div>
<div class="flex flex-wrap gap-2">
<button class="px-5 py-2.5 rounded-full bg-primary text-on-primary text-sm font-semibold shadow-sm transition-all active:scale-95">BCS Preliminary</button>
<button class="px-5 py-2.5 rounded-full bg-surface-container-lowest border border-outline-variant/30 text-on-surface-variant text-sm font-medium hover:bg-surface-container-low transition-all">Bank Job</button>
<button class="px-5 py-2.5 rounded-full bg-surface-container-lowest border border-outline-variant/30 text-on-surface-variant text-sm font-medium hover:bg-surface-container-low transition-all">Primary Teacher</button>
</div>
</section>
<!-- Subject Selector -->
<section class="space-y-4">
<h2 class="text-sm font-bold text-on-surface uppercase tracking-widest">Subject</h2>
<div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
<button class="flex items-center justify-center px-4 py-3 rounded-xl bg-surface-container-lowest border-2 border-primary text-primary font-bold transition-all">
                    Bangla
                </button>
<button class="flex items-center justify-center px-4 py-3 rounded-xl bg-surface-container-lowest border border-outline-variant/30 text-on-surface-variant font-medium hover:bg-surface-container-low transition-all">
                    English
                </button>
<button class="flex items-center justify-center px-4 py-3 rounded-xl bg-surface-container-lowest border border-outline-variant/30 text-on-surface-variant font-medium hover:bg-surface-container-low transition-all">
                    Math
                </button>
<button class="flex items-center justify-center px-4 py-3 rounded-xl bg-surface-container-lowest border border-outline-variant/30 text-on-surface-variant font-medium hover:bg-surface-container-low transition-all">
                    GK
                </button>
</div>
</section>
<!-- Topic Selector -->
<section class="space-y-4">
<h2 class="text-sm font-bold text-on-surface uppercase tracking-widest">Chapters / Topics</h2>
<button class="w-full flex items-center justify-between p-4 rounded-xl bg-surface-container-lowest border border-outline-variant/20 hover:bg-surface-container-low transition-all group">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-outline" data-icon="account_tree">account_tree</span>
<span class="text-on-surface-variant font-medium">Select Chapters/Topics</span>
</div>
<div class="flex items-center gap-2">
<span class="text-xs font-bold text-primary px-2 py-0.5 bg-primary/10 rounded">All selected</span>
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</div>
</button>
</section>
<!-- Mode Selector -->
<section class="space-y-4">
<h2 class="text-sm font-bold text-on-surface uppercase tracking-widest">Practice Mode</h2>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
<!-- Instant -->
<button class="flex flex-col items-start p-5 rounded-2xl bg-surface-container-lowest border-2 border-primary text-left transition-all relative">
<div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-primary" data-icon="bolt">bolt</span>
</div>
<span class="font-bold text-on-surface">Instant</span>
<span class="text-xs text-on-surface-variant mt-1">Immediate feedback after every answer</span>
<div class="absolute top-4 right-4 text-primary">
<span class="material-symbols-outlined" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Timed -->
<button class="flex flex-col items-start p-5 rounded-2xl bg-surface-container-lowest border border-outline-variant/30 text-left transition-all hover:bg-surface-container-low">
<div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="timer">timer</span>
</div>
<span class="font-bold text-on-surface">Timed</span>
<span class="text-xs text-on-surface-variant mt-1">Simulated exam environment with clock</span>
</button>
<!-- Wrong Only -->
<button class="flex flex-col items-start p-5 rounded-2xl bg-surface-container-lowest border border-outline-variant/30 text-left transition-all hover:bg-surface-container-low">
<div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="error">error</span>
</div>
<span class="font-bold text-on-surface">Wrong Only</span>
<span class="text-xs text-on-surface-variant mt-1">Focus on reviewing past mistakes</span>
</button>
<!-- Favorites -->
<button class="flex flex-col items-start p-5 rounded-2xl bg-surface-container-lowest border border-outline-variant/30 text-left transition-all hover:bg-surface-container-low">
<div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="bookmark">bookmark</span>
</div>
<span class="font-bold text-on-surface">Favorites</span>
<span class="text-xs text-on-surface-variant mt-1">Practice only bookmarked questions</span>
</button>
</div>
</section>
<!-- Question Count -->
<section class="space-y-4">
<h2 class="text-sm font-bold text-on-surface uppercase tracking-widest">Question Count</h2>
<div class="flex items-center bg-surface-container-low p-1.5 rounded-2xl">
<button class="flex-1 py-3 text-sm font-bold text-on-surface-variant rounded-xl hover:bg-surface-container-highest transition-all">10</button>
<button class="flex-1 py-3 text-sm font-bold text-on-surface bg-surface-container-lowest shadow-sm rounded-xl transition-all">20</button>
<button class="flex-1 py-3 text-sm font-bold text-on-surface-variant rounded-xl hover:bg-surface-container-highest transition-all">50</button>
<button class="flex-1 py-3 text-sm font-bold text-on-surface-variant rounded-xl hover:bg-surface-container-highest transition-all">100</button>
</div>
</section>
<!-- Start Button Section -->
<section class="pt-6">
<button class="w-full py-5 rounded-2xl bg-primary text-on-primary font-bold text-lg shadow-lg shadow-primary/20 flex items-center justify-center gap-3 transition-all hover:scale-[1.02] active:scale-[0.98]">
                Start Practice Session
                <span class="material-symbols-outlined" data-icon="play_arrow">play_arrow</span>
</button>
<p class="text-center text-xs text-on-surface-variant mt-4 font-label">Estimated time: 15-20 minutes</p>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 pb-6 pt-3 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-t border-slate-100 dark:border-slate-800/50 shadow-[0_-4px_20px_0_rgba(0,0,0,0.04)] rounded-t-2xl">
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-[#00A76F] transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined mb-1" data-icon="home">home</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide uppercase">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-[#00A76F] transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined mb-1" data-icon="import_contacts">import_contacts</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide uppercase">Learn</span>
</a>
<a class="flex flex-col items-center justify-center text-[#00A76F] dark:text-[#00A76F] relative after:content-[''] after:absolute after:-bottom-1 after:w-1 after:h-1 after:bg-[#00A76F] after:rounded-full active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined mb-1" data-icon="fitness_center">fitness_center</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide uppercase">Practice</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-[#00A76F] transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide uppercase">Profile</span>
</a>
</nav>
</body></html>
