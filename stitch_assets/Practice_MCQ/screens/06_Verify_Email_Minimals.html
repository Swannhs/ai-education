<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,100..900;1,100..900&amp;family=Inter:wght@100..900&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-surface-variant": "#3d4a41",
              "surface-bright": "#f6f9ff",
              "primary-container": "#00a76f",
              "on-primary-fixed-variant": "#005234",
              "on-tertiary-fixed": "#291800",
              "on-secondary-fixed-variant": "#004398",
              "primary": "#006c46",
              "surface-container-highest": "#d4e5f5",
              "on-surface": "#0d1d29",
              "surface-variant": "#d4e5f5",
              "on-primary-fixed": "#002112",
              "inverse-surface": "#22323e",
              "on-secondary": "#ffffff",
              "on-tertiary-fixed-variant": "#624000",
              "surface-container-lowest": "#ffffff",
              "outline": "#6d7a71",
              "on-error": "#ffffff",
              "tertiary-container": "#c78500",
              "secondary-fixed": "#d9e2ff",
              "primary-fixed": "#79fabb",
              "surface-container-high": "#d9eafa",
              "surface-container": "#e0f0ff",
              "tertiary": "#825500",
              "error-container": "#ffdad6",
              "secondary-container": "#5790ff",
              "surface-dim": "#cbdcec",
              "on-background": "#0d1d29",
              "background": "#f6f9ff",
              "surface": "#f6f9ff",
              "secondary-fixed-dim": "#afc6ff",
              "tertiary-fixed": "#ffddb3",
              "on-primary": "#ffffff",
              "outline-variant": "#bccabf",
              "surface-tint": "#006c46",
              "on-error-container": "#93000a",
              "on-primary-container": "#00321f",
              "inverse-primary": "#5adda0",
              "secondary": "#0459c5",
              "on-tertiary": "#ffffff",
              "primary-fixed-dim": "#5adda0",
              "on-tertiary-container": "#3e2700",
              "error": "#ba1a1a",
              "surface-container-low": "#ebf5ff",
              "tertiary-fixed-dim": "#ffb950",
              "on-secondary-fixed": "#001a43",
              "inverse-on-surface": "#e6f2ff",
              "on-secondary-container": "#002963"
            },
            fontFamily: {
              "headline": ["Public Sans", "sans-serif"],
              "body": ["Public Sans", "sans-serif"],
              "label": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      input[type=number]::-webkit-inner-spin-button, 
      input[type=number]::-webkit-outer-spin-button { 
        -webkit-appearance: none; 
        margin: 0; 
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface">
<!-- Screen Container -->
<div class="min-h-screen flex flex-col items-center justify-center p-4">
<!-- Verification Card -->
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl p-8 md:p-12 shadow-[0_32px_64px_-12px_rgba(13,29,41,0.04)]">
<!-- Focused Header (Back-to-Main Exception) -->
<div class="flex items-center mb-10">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-low transition-colors text-on-surface">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="flex-1 text-center font-headline text-lg font-bold tracking-tight pr-10">Verify Email</h1>
</div>
<!-- Illustration Area -->
<div class="flex justify-center mb-8">
<div class="relative flex items-center justify-center w-24 h-24 rounded-full bg-surface-container-low">
<div class="absolute inset-0 rounded-full bg-primary-container opacity-10 animate-pulse"></div>
<span class="material-symbols-outlined text-primary text-5xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">mark_email_unread</span>
</div>
</div>
<!-- Content -->
<div class="text-center space-y-3 mb-10">
<h2 class="font-headline text-3xl font-bold tracking-tight text-on-surface">Verify Your Email</h2>
<p class="font-body text-on-surface-variant text-base leading-relaxed">
                    We've sent a 6-digit verification code to your email. Enter it below to proceed.
                </p>
</div>
<!-- Verification Form -->
<form action="#" class="space-y-10">
<!-- 6-Digit Code Input -->
<div class="flex justify-between gap-2 sm:gap-4">
<input class="w-12 h-14 sm:w-14 sm:h-16 text-center text-2xl font-bold rounded-lg bg-surface-container-low border-none focus:ring-2 focus:ring-primary-container/30 transition-all text-on-surface placeholder-outline-variant" maxlength="1" placeholder="-" type="number"/>
<input class="w-12 h-14 sm:w-14 sm:h-16 text-center text-2xl font-bold rounded-lg bg-surface-container-low border-none focus:ring-2 focus:ring-primary-container/30 transition-all text-on-surface placeholder-outline-variant" maxlength="1" placeholder="-" type="number"/>
<input class="w-12 h-14 sm:w-14 sm:h-16 text-center text-2xl font-bold rounded-lg bg-surface-container-low border-none focus:ring-2 focus:ring-primary-container/30 transition-all text-on-surface placeholder-outline-variant" maxlength="1" placeholder="-" type="number"/>
<input class="w-12 h-14 sm:w-14 sm:h-16 text-center text-2xl font-bold rounded-lg bg-surface-container-low border-none focus:ring-2 focus:ring-primary-container/30 transition-all text-on-surface placeholder-outline-variant" maxlength="1" placeholder="-" type="number"/>
<input class="w-12 h-14 sm:w-14 sm:h-16 text-center text-2xl font-bold rounded-lg bg-surface-container-low border-none focus:ring-2 focus:ring-primary-container/30 transition-all text-on-surface placeholder-outline-variant" maxlength="1" placeholder="-" type="number"/>
<input class="w-12 h-14 sm:w-14 sm:h-16 text-center text-2xl font-bold rounded-lg bg-surface-container-low border-none focus:ring-2 focus:ring-primary-container/30 transition-all text-on-surface placeholder-outline-variant" maxlength="1" placeholder="-" type="number"/>
</div>
<!-- Action Button -->
<div class="space-y-6">
<button class="w-full bg-primary-container hover:bg-primary text-on-primary font-headline font-bold py-4 rounded-xl transition-all shadow-[0_8px_16px_-4px_rgba(0,167,111,0.24)] hover:shadow-none active:scale-[0.98]" type="submit">
                        Verify &amp; Continue
                    </button>
<div class="text-center">
<p class="font-label text-sm text-on-surface-variant">
                            Didn't receive code? 
                            <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Resend</a>
</p>
</div>
</div>
</form>
</div>
<!-- System Branding / Subtle Footer -->
<div class="mt-8 flex items-center gap-2 opacity-40">
<span class="material-symbols-outlined text-xs">verified_user</span>
<span class="font-label text-xs tracking-widest uppercase">Secure Verification System</span>
</div>
</div>
</body></html>
