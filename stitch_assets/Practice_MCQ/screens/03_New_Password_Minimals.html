<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary-fixed-variant": "#624000",
              "on-secondary-fixed-variant": "#004398",
              "surface-container-high": "#d9eafa",
              "primary": "#006c46",
              "error": "#ba1a1a",
              "secondary-fixed-dim": "#afc6ff",
              "on-background": "#0d1d29",
              "surface-tint": "#006c46",
              "inverse-on-surface": "#e6f2ff",
              "surface-bright": "#f6f9ff",
              "primary-container": "#00a76f",
              "primary-fixed": "#79fabb",
              "on-error": "#ffffff",
              "outline": "#6d7a71",
              "surface-container-lowest": "#ffffff",
              "inverse-surface": "#22323e",
              "tertiary-fixed": "#ffddb3",
              "surface-dim": "#cbdcec",
              "secondary-container": "#5790ff",
              "surface-container-highest": "#d4e5f5",
              "tertiary": "#825500",
              "surface-container-low": "#ebf5ff",
              "on-tertiary-container": "#3e2700",
              "on-tertiary-fixed": "#291800",
              "inverse-primary": "#5adda0",
              "on-primary": "#ffffff",
              "surface-container": "#e0f0ff",
              "on-secondary-fixed": "#001a43",
              "tertiary-container": "#c78500",
              "primary-fixed-dim": "#5adda0",
              "on-primary-fixed-variant": "#005234",
              "on-primary-container": "#00321f",
              "on-tertiary": "#ffffff",
              "error-container": "#ffdad6",
              "on-error-container": "#93000a",
              "surface": "#f6f9ff",
              "secondary": "#0459c5",
              "tertiary-fixed-dim": "#ffb950",
              "on-primary-fixed": "#002112",
              "on-surface-variant": "#3d4a41",
              "surface-variant": "#d4e5f5",
              "on-secondary": "#ffffff",
              "secondary-fixed": "#d9e2ff",
              "on-secondary-container": "#002963",
              "outline-variant": "#bccabf",
              "on-surface": "#0d1d29",
              "background": "#f6f9ff"
            },
            fontFamily: {
              "headline": ["Public Sans", "sans-serif"],
              "body": ["Public Sans", "sans-serif"],
              "label": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-effect {
        background: rgba(246, 249, 255, 0.8);
        backdrop-filter: blur(12px);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed">
<div class="flex min-h-screen w-full flex-col items-center justify-center p-4 md:p-8">
<!-- Focused Header (Hierarchy of Focus: No Shared Nav) -->
<header class="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-4 py-4 md:px-8">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-surface-container transition-colors text-on-surface">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline text-base font-semibold tracking-tight text-on-surface">Reset Password</h1>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<main class="w-full max-w-[480px] mt-16 flex flex-col items-center">
<!-- Branding/Security Icon -->
<div class="mb-8 flex flex-col items-center">
<div class="flex h-24 w-24 items-center justify-center rounded-full bg-surface-container-low text-primary-container relative overflow-hidden">
<div class="absolute inset-0 bg-primary opacity-5"></div>
<span class="material-symbols-outlined !text-5xl" data-icon="lock_reset">lock_reset</span>
</div>
</div>
<!-- Content Section -->
<div class="w-full bg-surface-container-lowest p-8 md:p-10 rounded-xl shadow-[0_32px_64px_-12px_rgba(13,29,41,0.04)] border border-outline-variant/10">
<div class="text-center mb-10">
<h2 class="font-headline text-3xl font-bold tracking-tight text-on-surface mb-3">Create New Password</h2>
<p class="font-body text-on-surface-variant text-base leading-relaxed">
                        Your new password must be different from previous passwords used with this account.
                    </p>
</div>
<form class="space-y-6">
<!-- New Password Field -->
<div class="space-y-2">
<label class="font-label text-sm font-semibold tracking-wide text-on-surface uppercase opacity-70 block">New Password</label>
<div class="relative group">
<input class="w-full h-14 px-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-highest transition-all duration-200 placeholder:text-outline/50 font-body text-on-surface" placeholder="Enter your new password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-2">
<label class="font-label text-sm font-semibold tracking-wide text-on-surface uppercase opacity-70 block">Confirm New Password</label>
<div class="relative group">
<input class="w-full h-14 px-4 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-highest transition-all duration-200 placeholder:text-outline/50 font-body text-on-surface" placeholder="Repeat your new password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Password Requirements (Visual Depth Layer) -->
<div class="p-4 rounded-lg bg-surface-container border border-outline-variant/10 mt-2">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined !text-sm text-primary" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-label text-xs font-medium text-on-surface-variant">At least 8 characters long</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined !text-sm text-outline/30">circle</span>
<span class="font-label text-xs font-medium text-on-surface-variant">Include a number and symbol</span>
</div>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full h-14 bg-primary-container hover:bg-primary text-white font-headline font-bold text-lg rounded-lg shadow-[0_8px_20px_-4px_rgba(0,167,111,0.3)] hover:shadow-[0_12px_24px_-4px_rgba(0,167,111,0.4)] transition-all duration-300 flex items-center justify-center gap-2" type="submit">
                            Update Password
                            <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
</div>
<!-- Bottom Support Text -->
<div class="mt-10 text-center">
<p class="font-body text-sm text-on-surface-variant">
                    Having trouble? <a class="text-primary font-semibold hover:underline decoration-2 underline-offset-4" href="#">Contact Support</a>
</p>
</div>
</main>
</div>
<!-- Background Decoration (The Editorial Precision Layer) -->
<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[50%] h-[50%] bg-primary opacity-[0.03] blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[40%] h-[40%] bg-secondary opacity-[0.03] blur-[100px] rounded-full"></div>
</div>
</body></html>
