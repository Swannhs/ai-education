<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Exam Preference Onboarding - BCS Prep Pro</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary-container": "#3e2700",
              "secondary-container": "#5790ff",
              "on-background": "#0d1d29",
              "on-surface-variant": "#3d4a41",
              "on-secondary": "#ffffff",
              "inverse-surface": "#22323e",
              "on-tertiary": "#ffffff",
              "on-surface": "#0d1d29",
              "surface-dim": "#cbdcec",
              "surface-bright": "#f6f9ff",
              "error": "#ba1a1a",
              "on-tertiary-fixed-variant": "#624000",
              "secondary-fixed": "#d9e2ff",
              "tertiary-fixed-dim": "#ffb950",
              "tertiary-fixed": "#ffddb3",
              "on-secondary-container": "#002963",
              "on-error": "#ffffff",
              "primary-fixed-dim": "#5adda0",
              "outline-variant": "#bccabf",
              "surface-container-lowest": "#ffffff",
              "surface-container": "#e0f0ff",
              "secondary": "#0459c5",
              "on-error-container": "#93000a",
              "secondary-fixed-dim": "#afc6ff",
              "on-primary": "#ffffff",
              "primary": "#006c46",
              "inverse-on-surface": "#e6f2ff",
              "surface-tint": "#006c46",
              "outline": "#6d7a71",
              "tertiary": "#825500",
              "surface-container-high": "#d9eafa",
              "on-primary-fixed": "#002112",
              "surface-variant": "#d4e5f5",
              "primary-container": "#00a76f",
              "on-secondary-fixed": "#001a43",
              "inverse-primary": "#5adda0",
              "error-container": "#ffdad6",
              "primary-fixed": "#79fabb",
              "on-primary-container": "#00321f",
              "on-secondary-fixed-variant": "#004398",
              "surface": "#f6f9ff",
              "on-tertiary-fixed": "#291800",
              "tertiary-container": "#c78500",
              "on-primary-fixed-variant": "#005234",
              "surface-container-highest": "#d4e5f5",
              "background": "#f6f9ff",
              "surface-container-low": "#ebf5ff"
            },
            fontFamily: {
              "headline": ["Public Sans"],
              "body": ["Public Sans"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .selection-active {
            box-shadow: 0 0 0 2px #006c46;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col">
<!-- Top Navigation Placeholder (Hidden for focused onboarding per Shell Visibility Rule) -->
<main class="flex-grow flex flex-col items-center px-6 pt-16 pb-24 max-w-2xl mx-auto w-full">
<!-- Section 1: Welcome text -->
<header class="text-center mb-12">
<div class="inline-flex items-center justify-center w-16 h-16 bg-primary-container text-on-primary-container rounded-xl mb-6 shadow-sm">
<span class="material-symbols-outlined text-3xl">rocket_launch</span>
</div>
<h1 class="text-3xl md:text-4xl font-headline font-black text-on-surface tracking-tight mb-4">
                Personalize Your Prep
            </h1>
<p class="text-on-surface-variant font-body leading-relaxed max-w-md mx-auto">
                Help us tailor your learning experience by selecting your target goal and current expertise level.
            </p>
</header>
<form class="w-full space-y-12">
<!-- Section 2: Select Target Exam -->
<section>
<div class="flex items-center justify-between mb-6">
<h2 class="font-headline font-bold text-lg text-on-surface">Target Exam</h2>
<span class="font-label text-xs uppercase tracking-widest text-on-surface-variant/60">Required</span>
</div>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
<!-- BCS Card (Active State shown for visual demo) -->
<label class="relative group cursor-pointer">
<input checked="" class="sr-only peer" name="exam" type="radio" value="bcs"/>
<div class="h-full p-6 bg-surface-container-lowest rounded-xl border-2 border-transparent transition-all duration-200 peer-checked:border-primary peer-checked:bg-primary/5 hover:bg-surface-container-low group-active:scale-[0.98]">
<div class="flex items-start justify-between">
<div class="w-12 h-12 rounded-lg bg-surface-container-high flex items-center justify-center text-primary mb-4 group-hover:bg-primary-container group-hover:text-on-primary-container transition-colors">
<span class="material-symbols-outlined">account_balance</span>
</div>
<span class="material-symbols-outlined text-primary opacity-0 peer-checked:opacity-100 transition-opacity">check_circle</span>
</div>
<h3 class="font-headline font-bold text-xl text-on-surface mb-1">BCS</h3>
<p class="text-sm text-on-surface-variant leading-snug">Bangladesh Civil Service Examination</p>
</div>
</label>
<!-- Bank Card -->
<label class="relative group cursor-pointer">
<input class="sr-only peer" name="exam" type="radio" value="bank"/>
<div class="h-full p-6 bg-surface-container-lowest rounded-xl border-2 border-transparent transition-all duration-200 peer-checked:border-primary peer-checked:bg-primary/5 hover:bg-surface-container-low group-active:scale-[0.98]">
<div class="flex items-start justify-between">
<div class="w-12 h-12 rounded-lg bg-surface-container-high flex items-center justify-center text-primary mb-4 group-hover:bg-primary-container group-hover:text-on-primary-container transition-colors">
<span class="material-symbols-outlined">payments</span>
</div>
<span class="material-symbols-outlined text-primary opacity-0 peer-checked:opacity-100 transition-opacity">check_circle</span>
</div>
<h3 class="font-headline font-bold text-xl text-on-surface mb-1">Bank</h3>
<p class="text-sm text-on-surface-variant leading-snug">Government &amp; Private Bank Job Exams</p>
</div>
</label>
<!-- NTRCA Card -->
<label class="relative group cursor-pointer">
<input class="sr-only peer" name="exam" type="radio" value="ntrca"/>
<div class="h-full p-6 bg-surface-container-lowest rounded-xl border-2 border-transparent transition-all duration-200 peer-checked:border-primary peer-checked:bg-primary/5 hover:bg-surface-container-low group-active:scale-[0.98]">
<div class="flex items-start justify-between">
<div class="w-12 h-12 rounded-lg bg-surface-container-high flex items-center justify-center text-primary mb-4 group-hover:bg-primary-container group-hover:text-on-primary-container transition-colors">
<span class="material-symbols-outlined">school</span>
</div>
<span class="material-symbols-outlined text-primary opacity-0 peer-checked:opacity-100 transition-opacity">check_circle</span>
</div>
<h3 class="font-headline font-bold text-xl text-on-surface mb-1">NTRCA</h3>
<p class="text-sm text-on-surface-variant leading-snug">Non-Govt. Teacher Registration</p>
</div>
</label>
<!-- Primary Card -->
<label class="relative group cursor-pointer">
<input class="sr-only peer" name="exam" type="radio" value="primary"/>
<div class="h-full p-6 bg-surface-container-lowest rounded-xl border-2 border-transparent transition-all duration-200 peer-checked:border-primary peer-checked:bg-primary/5 hover:bg-surface-container-low group-active:scale-[0.98]">
<div class="flex items-start justify-between">
<div class="w-12 h-12 rounded-lg bg-surface-container-high flex items-center justify-center text-primary mb-4 group-hover:bg-primary-container group-hover:text-on-primary-container transition-colors">
<span class="material-symbols-outlined">child_care</span>
</div>
<span class="material-symbols-outlined text-primary opacity-0 peer-checked:opacity-100 transition-opacity">check_circle</span>
</div>
<h3 class="font-headline font-bold text-xl text-on-surface mb-1">Primary</h3>
<p class="text-sm text-on-surface-variant leading-snug">Primary Teacher Recruitment</p>
</div>
</label>
</div>
</section>
<!-- Section 3: Select Study Level -->
<section>
<div class="flex items-center justify-between mb-6">
<h2 class="font-headline font-bold text-lg text-on-surface">Knowledge Level</h2>
</div>
<div class="space-y-3">
<!-- Beginner -->
<label class="block group cursor-pointer">
<input class="sr-only peer" name="level" type="radio" value="beginner"/>
<div class="flex items-center gap-4 p-4 bg-surface-container-low rounded-xl border-2 border-transparent peer-checked:border-primary peer-checked:bg-surface-container-highest transition-all duration-200">
<div class="w-10 h-10 flex-shrink-0 bg-white rounded-lg flex items-center justify-center text-primary-container shadow-sm">
<span class="material-symbols-outlined">star_rate</span>
</div>
<div class="flex-grow">
<span class="block font-headline font-bold text-on-surface">Beginner</span>
<span class="block font-label text-xs text-on-surface-variant">Starting from the basics</span>
</div>
<span class="material-symbols-outlined text-primary opacity-0 peer-checked:opacity-100">done</span>
</div>
</label>
<!-- Intermediate -->
<label class="block group cursor-pointer">
<input checked="" class="sr-only peer" name="level" type="radio" value="intermediate"/>
<div class="flex items-center gap-4 p-4 bg-surface-container-low rounded-xl border-2 border-transparent peer-checked:border-primary peer-checked:bg-surface-container-highest transition-all duration-200">
<div class="w-10 h-10 flex-shrink-0 bg-white rounded-lg flex items-center justify-center text-primary-container shadow-sm">
<span class="material-symbols-outlined">trending_up</span>
</div>
<div class="flex-grow">
<span class="block font-headline font-bold text-on-surface">Intermediate</span>
<span class="block font-label text-xs text-on-surface-variant">Familiar with major topics</span>
</div>
<span class="material-symbols-outlined text-primary opacity-0 peer-checked:opacity-100">done</span>
</div>
</label>
<!-- Advanced -->
<label class="block group cursor-pointer">
<input class="sr-only peer" name="level" type="radio" value="advanced"/>
<div class="flex items-center gap-4 p-4 bg-surface-container-low rounded-xl border-2 border-transparent peer-checked:border-primary peer-checked:bg-surface-container-highest transition-all duration-200">
<div class="w-10 h-10 flex-shrink-0 bg-white rounded-lg flex items-center justify-center text-primary-container shadow-sm">
<span class="material-symbols-outlined">workspace_premium</span>
</div>
<div class="flex-grow">
<span class="block font-headline font-bold text-on-surface">Advanced</span>
<span class="block font-label text-xs text-on-surface-variant">Focused on complex analysis</span>
</div>
<span class="material-symbols-outlined text-primary opacity-0 peer-checked:opacity-100">done</span>
</div>
</label>
</div>
</section>
<!-- Section 4: Primary 'Continue' button -->
<footer class="pt-8">
<button class="w-full h-14 bg-primary text-on-primary rounded-xl font-headline font-bold text-lg shadow-lg shadow-primary/20 hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                    Continue to Dashboard
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
<p class="text-center mt-6 text-on-surface-variant font-label text-sm">
                    Step 1 of 3: Goal Setting
                </p>
</footer>
</form>
</main>
<!-- Branding Element (Small & Unobtrusive) -->
<div class="fixed top-8 left-8 hidden lg:block">
<span class="font-headline font-black text-2xl text-primary tracking-tighter">BCS Prep Pro</span>
</div>
</body></html>
