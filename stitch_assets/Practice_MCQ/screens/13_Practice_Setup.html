<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Practice Setup - BCS &amp; Gov Job Prep</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

            display: inline-block;
            line-height: 1;

            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            font-family: 'Public Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-fixed": "#79fabb",
              "surface-container-lowest": "#ffffff",
              "tertiary": "#825500",
              "on-background": "#0d1d29",
              "tertiary-container": "#c78500",

              "secondary-fixed-dim": "#afc6ff",
              "secondary-fixed": "#d9e2ff",

              "surface": "#f6f9ff",
              "surface-container": "#e0f0ff",
              "surface-variant": "#d4e5f5",
              "error": "#ba1a1a",
              "on-secondary": "#ffffff",
              "surface-tint": "#006c46",
              "surface-container-highest": "#d4e5f5",
              "on-surface-variant": "#3d4a41",
              "secondary": "#0459c5",
              "inverse-primary": "#5adda0",
              "error-container": "#ffdad6",
              "on-secondary-fixed-variant": "#004398",
              "on-primary-fixed-variant": "#005234",
              "primary": "#006c46",
              "outline": "#6d7a71",
              "surface-container-low": "#ebf5ff",
              "on-error": "#ffffff",
              "on-tertiary": "#ffffff",
              "on-primary": "#ffffff",
              "on-secondary-fixed": "#001a43",
              "secondary-container": "#5790ff",
              "outline-variant": "#bccabf",
              "primary-container": "#00a76f",
              "on-surface": "#0d1d29",
              "background": "#f6f9ff",
              "on-tertiary-container": "#3e2700",
              "tertiary-fixed": "#ffddb3",
              "on-tertiary-fixed-variant": "#624000",
              "on-tertiary-fixed": "#291800",
              "tertiary-fixed-dim": "#ffb950",
              "inverse-on-surface": "#e6f2ff",
              "inverse-surface": "#22323e",
              "on-primary-container": "#00321f"
            },
            fontFamily: {
              "headline": ["Public Sans"],
              "body": ["Public Sans"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
<!-- TopAppBar Component -->
<header class="w-full top-0 sticky z-50 bg-slate-50 dark:bg-slate-900 shadow-none">
<div class="flex items-center justify-between px-6 py-4 w-full">
<button class="text-slate-500 hover:bg-slate-200/50 transition-colors p-2 rounded-full active:scale-95 duration-150">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-['Public_Sans'] font-semibold text-lg tracking-tight text-[#00A76F]">Practice Setup</h1>
<button class="text-slate-500 hover:bg-slate-200/50 transition-colors p-2 rounded-full active:scale-95 duration-150">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</header>
<main class="max-w-md mx-auto px-6 py-8 space-y-12">
<!-- Section 1: Subject Selection -->
<section class="space-y-4">
<div class="flex items-center justify-between">
<h2 class="text-on-surface font-headline font-bold text-xl tracking-tight">Subject Selection</h2>
<span class="text-primary font-label text-xs font-semibold uppercase tracking-wider">Required</span>
</div>
<div class="flex overflow-x-auto hide-scrollbar gap-3 -mx-6 px-6">
<!-- Selected Chip -->
<button class="flex-shrink-0 bg-primary-container text-on-primary-container px-5 py-3 rounded-xl font-label text-sm font-semibold flex items-center gap-2 shadow-sm">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">menu_book</span>
                    Bangla
                </button>
<button class="flex-shrink-0 bg-surface-container-lowest text-on-surface-variant px-5 py-3 rounded-xl font-label text-sm font-medium flex items-center gap-2 hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-[18px]">language</span>
                    English
                </button>
<button class="flex-shrink-0 bg-surface-container-lowest text-on-surface-variant px-5 py-3 rounded-xl font-label text-sm font-medium flex items-center gap-2 hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-[18px]">calculate</span>
                    Math
                </button>
<button class="flex-shrink-0 bg-surface-container-lowest text-on-surface-variant px-5 py-3 rounded-xl font-label text-sm font-medium flex items-center gap-2 hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-[18px]">public</span>
                    GK
                </button>
<button class="flex-shrink-0 bg-surface-container-lowest text-on-surface-variant px-5 py-3 rounded-xl font-label text-sm font-medium flex items-center gap-2 hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-[18px]">biotech</span>
                    Science
                </button>
</div>
</section>
<!-- Section 2: Topic Selection -->
<section class="space-y-4">
<h2 class="text-on-surface font-headline font-bold text-xl tracking-tight">Topic Selection</h2>
<div class="relative group">
<button class="w-full bg-surface-container-low p-5 rounded-xl flex items-center justify-between group-hover:bg-surface-container-high transition-all border border-transparent focus:border-primary/30 outline-none">
<div class="flex items-center gap-4">
<div class="w-12 h-12 bg-surface-container-lowest rounded-lg flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[28px]">schema</span>
</div>
<div class="text-left">
<p class="text-on-surface font-semibold text-base">Select Topic</p>
<p class="text-on-surface-variant text-sm font-label">All topics currently selected</p>
</div>
</div>
<span class="material-symbols-outlined text-outline">expand_more</span>
</button>
</div>
</section>
<!-- Section 3: Mode Selection -->
<section class="space-y-4">
<h2 class="text-on-surface font-headline font-bold text-xl tracking-tight">Practice Mode</h2>
<div class="grid grid-cols-1 gap-4">
<!-- Mode: Instant -->
<label class="relative flex cursor-pointer group">
<input checked="" class="sr-only peer" name="mode" type="radio" value="instant"/>
<div class="w-full bg-surface-container-lowest p-5 rounded-2xl border-2 border-transparent peer-checked:border-primary-container peer-checked:bg-primary/5 transition-all duration-200">
<div class="flex items-start gap-4">
<div class="mt-1 w-10 h-10 rounded-full flex items-center justify-center bg-primary/10 text-primary peer-checked:bg-primary peer-checked:text-white transition-colors">
<span class="material-symbols-outlined text-[20px]">bolt</span>
</div>
<div class="flex-1">
<div class="flex items-center justify-between">
<h3 class="font-bold text-on-surface">Instant</h3>
<div class="w-5 h-5 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:border-primary">
<div class="w-2.5 h-2.5 rounded-full bg-primary opacity-0 peer-checked:opacity-100 transition-opacity"></div>
</div>
</div>
<p class="text-sm text-on-surface-variant font-label mt-1">Get immediate feedback after each question.</p>
</div>
</div>
</div>
</label>
<!-- Mode: Timed -->
<label class="relative flex cursor-pointer group">
<input class="sr-only peer" name="mode" type="radio" value="timed"/>
<div class="w-full bg-surface-container-lowest p-5 rounded-2xl border-2 border-transparent peer-checked:border-primary-container peer-checked:bg-primary/5 transition-all duration-200">
<div class="flex items-start gap-4">
<div class="mt-1 w-10 h-10 rounded-full flex items-center justify-center bg-secondary/10 text-secondary">
<span class="material-symbols-outlined text-[20px]">timer</span>
</div>
<div class="flex-1">
<h3 class="font-bold text-on-surface">Timed</h3>
<p class="text-sm text-on-surface-variant font-label mt-1">Simulate real exam conditions with a countdown.</p>
</div>
</div>
</div>
</label>
<!-- Mode: Wrong Answers -->
<label class="relative flex cursor-pointer group">
<input class="sr-only peer" name="mode" type="radio" value="wrong"/>
<div class="w-full bg-surface-container-lowest p-5 rounded-2xl border-2 border-transparent peer-checked:border-primary-container peer-checked:bg-primary/5 transition-all duration-200">
<div class="flex items-start gap-4">
<div class="mt-1 w-10 h-10 rounded-full flex items-center justify-center bg-error-container text-error">
<span class="material-symbols-outlined text-[20px]">replay</span>
</div>
<div class="flex-1">
<h3 class="font-bold text-on-surface">Wrong Answers Only</h3>
<p class="text-sm text-on-surface-variant font-label mt-1">Practice questions you've missed previously.</p>
</div>
</div>
</div>
</label>
</div>
</section>
<!-- Dynamic Summary Card -->
<div class="bg-surface-container-highest/40 rounded-3xl p-6 border border-outline-variant/10">
<div class="flex items-center gap-3 mb-4">
<span class="material-symbols-outlined text-primary">info</span>
<p class="text-sm font-semibold text-on-surface-variant">Session Preview</p>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1">
<p class="text-xs font-label text-outline uppercase tracking-wider">Total Questions</p>
<p class="text-lg font-bold text-on-surface">50 Qs</p>
</div>
<div class="space-y-1 text-right">
<p class="text-xs font-label text-outline uppercase tracking-wider">Estimated Time</p>
<p class="text-lg font-bold text-on-surface">45 Mins</p>
</div>
</div>
</div>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-white/80 backdrop-blur-xl border-t border-slate-100 dark:border-slate-800 z-50">
<div class="max-w-md mx-auto">
<button class="w-full bg-primary hover:bg-surface-tint text-on-primary py-4 rounded-xl font-bold text-lg shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                Start Practice Session
                <span class="material-symbols-outlined">play_arrow</span>
</button>
</div>
</div>
<!-- BottomNavBar Component -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-t border-slate-100 dark:border-slate-800 shadow-[0_-4px_20px_rgba(0,0,0,0.03)] hidden">
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-[#00A76F] transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide uppercase">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-[#00A76F] dark:text-[#00A76F] bg-[#00A76F]/10 rounded-xl px-3 py-1 transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">exercise</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide uppercase">Practice</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-[#00A76F] transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined">analytics</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide uppercase">Analytics</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-[#00A76F] transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide uppercase">Profile</span>
</a>
</nav>
</body></html>
