<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .otp-shadow {
        box-shadow: 0 8px 32px -4px rgba(0, 0, 0, 0.04);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center">
<!-- Top Navigation Header -->
<!-- Applying Shared Component: TopAppBar logic -->
<header class="w-full top-0 sticky bg-slate-50 dark:bg-slate-900 z-50">
<div class="flex items-center justify-between px-6 py-4 w-full max-w-7xl mx-auto">
<button class="text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors p-2 rounded-full active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="font-public-sans font-semibold text-lg tracking-tight text-on-surface">
                Verify Code
            </div>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
</header>
<main class="flex-1 w-full max-w-lg px-6 flex flex-col justify-center items-center py-12">
<!-- Illustration / Icon Section -->
<div class="mb-10 text-center">
<div class="w-20 h-20 bg-primary-container/10 rounded-3xl flex items-center justify-center mx-auto mb-6">
<span class="material-symbols-outlined text-primary-container text-4xl" data-icon="forward_to_inbox" style="font-variation-settings: 'FILL' 1;">forward_to_inbox</span>
</div>
<h1 class="text-on-surface font-headline font-bold text-3xl tracking-tight mb-3">
                Verify Code
            </h1>
<p class="text-on-surface-variant font-body text-base leading-relaxed max-w-xs mx-auto">
                We have sent a code to your email
            </p>
</div>
<!-- Verification Card -->
<div class="w-full bg-surface-container-lowest rounded-[2rem] p-8 otp-shadow border border-outline-variant/10">
<form action="#" class="space-y-8">
<!-- Code Input Grid -->
<div class="grid grid-cols-6 gap-2 sm:gap-4">
<input class="w-full h-14 sm:h-16 text-center text-2xl font-bold rounded-xl bg-surface-container-low border-none focus:ring-2 focus:ring-primary-container/30 transition-all text-on-surface" maxlength="1" placeholder="-" type="text"/>
<input class="w-full h-14 sm:h-16 text-center text-2xl font-bold rounded-xl bg-surface-container-low border-none focus:ring-2 focus:ring-primary-container/30 transition-all text-on-surface" maxlength="1" placeholder="-" type="text"/>
<input class="w-full h-14 sm:h-16 text-center text-2xl font-bold rounded-xl bg-surface-container-low border-none focus:ring-2 focus:ring-primary-container/30 transition-all text-on-surface" maxlength="1" placeholder="-" type="text"/>
<input class="w-full h-14 sm:h-16 text-center text-2xl font-bold rounded-xl bg-surface-container-low border-none focus:ring-2 focus:ring-primary-container/30 transition-all text-on-surface" maxlength="1" placeholder="-" type="text"/>
<input class="w-full h-14 sm:h-16 text-center text-2xl font-bold rounded-xl bg-surface-container-low border-none focus:ring-2 focus:ring-primary-container/30 transition-all text-on-surface" maxlength="1" placeholder="-" type="text"/>
<input class="w-full h-14 sm:h-16 text-center text-2xl font-bold rounded-xl bg-surface-container-low border-none focus:ring-2 focus:ring-primary-container/30 transition-all text-on-surface" maxlength="1" placeholder="-" type="text"/>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary-container text-on-primary font-headline font-semibold py-4 rounded-xl shadow-lg shadow-primary-container/20 active:scale-95 transition-all hover:bg-primary duration-300" type="submit">
                    Verify &amp; Continue
                </button>
</form>
<!-- Secondary Options -->
<div class="mt-8 text-center">
<p class="text-on-surface-variant font-label text-sm mb-2">
                    Don't receive code?
                </p>
<button class="text-primary-container font-headline font-bold text-sm tracking-wide hover:underline transition-all">
                    Resend Code
                </button>
</div>
</div>
<!-- Support Text -->
<div class="mt-12 text-center">
<p class="text-on-surface-variant font-label text-xs tracking-wider uppercase opacity-60">
                GovPrep Bangladesh Secure Access
            </p>
</div>
</main>
<!-- Bottom Navigation suppressed as per "The Destination Rule" for Task-Focused screens -->
<!-- Editorial Decorative Elements -->
<div class="fixed top-0 right-0 -z-10 w-1/2 h-full pointer-events-none overflow-hidden opacity-5">
<div class="absolute top-1/4 right-0 w-96 h-96 bg-primary-container rounded-full blur-[100px]"></div>
</div>
<div class="fixed bottom-0 left-0 -z-10 w-1/2 h-full pointer-events-none overflow-hidden opacity-5">
<div class="absolute bottom-1/4 left-0 w-96 h-96 bg-secondary-container rounded-full blur-[100px]"></div>
</div>
