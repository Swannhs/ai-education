<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GovPrep Pro - MCQ Session</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "error": "#ba1a1a",
                        "on-secondary-fixed-variant": "#004398",
                        "surface-bright": "#f6f9ff",
                        "secondary-fixed": "#d9e2ff",
                        "primary-fixed": "#79fabb",
                        "surface-variant": "#d4e5f5",
                        "inverse-primary": "#5adda0",
                        "primary-container": "#00a76f",
                        "surface-container-low": "#ebf5ff",
                        "on-surface-variant": "#3d4a41",
                        "on-tertiary-container": "#3e2700",
                        "on-tertiary-fixed-variant": "#624000",
                        "surface-dim": "#cbdcec",
                        "on-secondary-container": "#002963",
                        "surface-tint": "#006c46",
                        "on-primary-fixed-variant": "#005234",
                        "tertiary-fixed": "#ffddb3",
                        "background": "#f6f9ff",
                        "primary": "#006c46",
                        "on-tertiary-fixed": "#291800",
                        "surface-container": "#e0f0ff",
                        "outline": "#6d7a71",
                        "on-secondary-fixed": "#001a43",
                        "on-error-container": "#93000a",
                        "on-background": "#0d1d29",
                        "outline-variant": "#bccabf",
                        "on-secondary": "#ffffff",
                        "on-primary": "#ffffff",
                        "secondary": "#0459c5",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#22323e",
                        "on-primary-container": "#00321f",
                        "surface-container-highest": "#d4e5f5",
                        "surface": "#f6f9ff",
                        "tertiary": "#825500",
                        "surface-container-high": "#d9eafa",
                        "primary-fixed-dim": "#5adda0",
                        "tertiary-container": "#c78500",
                        "on-error": "#ffffff",
                        "secondary-container": "#5790ff",
                        "inverse-on-surface": "#e6f2ff",
                        "on-primary-fixed": "#002112",
                        "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#ffb950",
                        "secondary-fixed-dim": "#afc6ff",
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#0d1d29"
                    },
                    fontFamily: {
                        "headline": ["Public Sans"],
                        "body": ["Public Sans"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Public Sans', sans-serif;
            background-color: #f6f9ff;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="flex justify-between items-center px-6 py-4 w-full sticky top-0 z-50 bg-[#f6f9ff] dark:bg-slate-900">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#00A76F] dark:text-[#00ffa5]" data-icon="timer">timer</span>
<span class="font-['Public_Sans'] font-bold text-lg text-[#0d1d29] dark:text-slate-100">Question 14/50</span>
</div>
<div class="flex items-center gap-4">
<div class="bg-primary-container/10 px-3 py-1.5 rounded-full flex items-center gap-2">
<span class="material-symbols-outlined text-[#00A76F] text-sm" data-icon="schedule">schedule</span>
<span class="text-[#00A76F] font-bold font-['Inter'] text-sm">12:45</span>
</div>
<button class="font-['Public_Sans'] font-bold text-lg text-slate-500 dark:text-slate-400 hover:bg-slate-200/50 dark:hover:bg-slate-800/50 transition-all duration-200 active:scale-95 px-3 py-1 rounded-lg">Finish</button>
</div>
</header>
<main class="flex-grow flex flex-col px-6 py-8 max-w-3xl mx-auto w-full">
<!-- Meta Info Row -->
<div class="flex flex-wrap gap-3 mb-6">
<span class="px-3 py-1 rounded-full bg-surface-container-high text-on-surface-variant font-['Inter'] text-xs font-semibold uppercase tracking-wider">Subject: English</span>
<span class="px-3 py-1 rounded-full bg-surface-container-high text-on-surface-variant font-['Inter'] text-xs font-semibold uppercase tracking-wider">Topic: Synonyms</span>
<span class="px-3 py-1 rounded-full bg-secondary-container/20 text-secondary font-['Inter'] text-xs font-semibold uppercase tracking-wider">Difficulty: Medium</span>
</div>
<!-- Question Block -->
<div class="bg-surface-container-lowest p-8 rounded-xl shadow-[0_4px_24px_rgba(13,29,41,0.04)] mb-8">
<h1 class="text-2xl md:text-3xl font-bold text-on-surface leading-snug">
                Which of the following is a synonym for "Abundant"?
            </h1>
</div>
<!-- Options Grid -->
<div class="space-y-4 mb-10">
<!-- Option A -->
<button class="w-full text-left p-5 rounded-xl bg-surface-container-lowest hover:bg-surface-container-low transition-all border border-transparent flex justify-between items-center group">
<span class="font-['Public_Sans'] text-lg text-on-surface"><span class="font-bold mr-3 opacity-50">A.</span> Scarce</span>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant group-hover:border-primary transition-colors"></div>
</button>
<!-- Option B (Selected State) -->
<button class="w-full text-left p-5 rounded-xl bg-[#00A76F]/5 transition-all border-2 border-[#00A76F] flex justify-between items-center">
<span class="font-['Public_Sans'] text-lg text-[#006c46] font-semibold"><span class="font-bold mr-3">B.</span> Plentiful</span>
<span class="material-symbols-outlined text-[#00A76F]" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<!-- Option C -->
<button class="w-full text-left p-5 rounded-xl bg-surface-container-lowest hover:bg-surface-container-low transition-all border border-transparent flex justify-between items-center group">
<span class="font-['Public_Sans'] text-lg text-on-surface"><span class="font-bold mr-3 opacity-50">C.</span> Rare</span>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant group-hover:border-primary transition-colors"></div>
</button>
<!-- Option D -->
<button class="w-full text-left p-5 rounded-xl bg-surface-container-lowest hover:bg-surface-container-low transition-all border border-transparent flex justify-between items-center group">
<span class="font-['Public_Sans'] text-lg text-on-surface"><span class="font-bold mr-3 opacity-50">D.</span> Sparse</span>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant group-hover:border-primary transition-colors"></div>
</button>
</div>
<!-- AI Helper Row -->
<div class="flex flex-wrap gap-2 mb-12 items-center justify-center">
<span class="font-['Inter'] text-[10px] uppercase tracking-widest text-slate-400 w-full text-center mb-2">Need a hint?</span>
<button class="flex items-center gap-2 px-4 py-2 bg-surface-container-low text-primary rounded-full font-['Inter'] text-sm font-semibold hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-lg" data-icon="lightbulb">lightbulb</span>
                Explain Answer
            </button>
<button class="flex items-center gap-2 px-4 py-2 bg-surface-container-low text-primary rounded-full font-['Inter'] text-sm font-semibold hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-lg" data-icon="auto_awesome">auto_awesome</span>
                Ask AI Tutor
            </button>
<button class="flex items-center gap-2 px-4 py-2 bg-surface-container-low text-primary rounded-full font-['Inter'] text-sm font-semibold hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-lg" data-icon="format_align_left">format_align_left</span>
                Simplify Concept
            </button>
<button class="flex items-center gap-2 px-4 py-2 bg-surface-container-low text-primary rounded-full font-['Inter'] text-sm font-semibold hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-lg" data-icon="mic">mic</span>
                Voice Ask
            </button>
</div>
<!-- Primary Action -->
<div class="mt-auto pb-12">
<button class="w-full py-5 bg-primary-container text-on-primary font-bold text-xl rounded-xl shadow-lg shadow-primary-container/20 active:scale-95 transition-transform">
                Next Question
            </button>
</div>
</main>
<!-- Bottom Progress Tracking -->
<div class="fixed bottom-20 md:bottom-24 w-full px-6 flex justify-center pointer-events-none">
<div class="w-full max-w-3xl bg-surface-container h-1.5 rounded-full overflow-hidden">
<div class="bg-primary h-full w-[28%] rounded-full shadow-[0_0_8px_rgba(0,108,70,0.4)]"></div>
</div>
</div>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-t border-slate-200/15 dark:border-slate-800/15 shadow-[0_-4px_32px_rgba(0,0,0,0.04)] rounded-t-2xl">
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 p-3 hover:text-[#00A76F] transition-colors">
<span class="material-symbols-outlined scale-110 duration-300 ease-out" data-icon="auto_awesome">auto_awesome</span>
</div>
<div class="flex flex-col items-center justify-center bg-[#00A76F]/10 dark:bg-[#00A76F]/20 text-[#00A76F] rounded-xl p-3">
<span class="material-symbols-outlined scale-110 duration-300 ease-out" data-icon="psychology" style="font-variation-settings: 'FILL' 1;">psychology</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 p-3 hover:text-[#00A76F] transition-colors">
<span class="material-symbols-outlined scale-110 duration-300 ease-out" data-icon="translate">translate</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 p-3 hover:text-[#00A76F] transition-colors">
<span class="material-symbols-outlined scale-110 duration-300 ease-out" data-icon="mic">mic</span>
</div>
</nav>
</body></html>
